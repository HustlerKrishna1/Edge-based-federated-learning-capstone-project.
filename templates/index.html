<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Traffic Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', Arial, sans-serif;
      text-align: center;
      background: #f0f2f5;
      padding: 40px 20px;
      min-height: 100vh;
    }
    h1 { color: #1a1a2e; font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: #6b7280; font-size: 0.85rem; margin-bottom: 30px; }
    .card {
      background: #fff;
      padding: 30px;
      border-radius: 14px;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .card h3 { color: #374151; font-size: 1rem; font-weight: 600; margin-bottom: 20px; }
    hr { border: none; border-top: 1px solid #e5e7eb; margin: 22px 0; }

    /* File input area */
    .file-area {
      border: 2px dashed #d1d5db;
      border-radius: 10px;
      padding: 24px 16px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 16px;
      position: relative;
    }
    .file-area:hover { border-color: #3b82f6; background: #eff6ff; }
    .file-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .file-icon { font-size: 2rem; margin-bottom: 8px; }
    .file-label { font-size: 0.85rem; color: #6b7280; }
    .file-name { font-size: 0.8rem; color: #3b82f6; margin-top: 6px; font-weight: 500; min-height: 16px; }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 11px 0;
      width: 100%;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #1d4ed8; transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .webcam-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #3b82f6;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      padding: 8px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .webcam-link:hover { background: #eff6ff; }

    /* Loading overlay */
    .loading { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.85);
      z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
    .loading.show { display: flex; }
    .spinner { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: #2563eb;
      border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: #374151; font-weight: 500; font-size: 0.9rem; }
  </style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>Analyzing traffic feed...</p>
</div>

<h1>🚦 AI-Based Traffic Control</h1>
<p class="subtitle">YOLOv8 · Federated Learning · LSTM Prediction</p>

<div class="card">
  <h3>Upload Traffic Image</h3>
  <form id="uploadForm" action="/process" method="POST" enctype="multipart/form-data">
    <div class="file-area" id="dropZone">
      <input type="file" name="file" accept="image/*" required id="fileInput">
      <div class="file-icon">🖼️</div>
      <div class="file-label">Click to select or drag & drop an image</div>
      <div class="file-name" id="fileName"></div>
    </div>
    <button type="submit">Upload & Analyze</button>
  </form>
  <hr>
  <a href="/webcam" class="webcam-link">🎥 View Real-Time Webcam Detection</a>
</div>

<script>
  document.getElementById('fileInput').addEventListener('change', function(e) {
    const f = e.target.files[0];
    if (f) document.getElementById('fileName').textContent = f.name;
  });
  document.getElementById('uploadForm').addEventListener('submit', function() {
    document.getElementById('loading').classList.add('show');
  });
  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor = '#3b82f6'; dz.style.background = '#eff6ff'; });
  dz.addEventListener('dragleave', () => { dz.style.borderColor = '#d1d5db'; dz.style.background = ''; });
</script>
</body>
</html>
