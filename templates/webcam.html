<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Traffic Feed — AI Traffic Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', Arial, sans-serif; background: #f0f2f5; text-align: center; min-height: 100vh; padding: 30px 16px; }

    h1 { color: #1a1a2e; font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: #6b7280; font-size: 0.85rem; margin-bottom: 24px; }

    /* Live badge */
    .live-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: #fee2e2; border: 1px solid #fca5a5;
      color: #dc2626; border-radius: 20px; padding: 5px 14px;
      font-size: 0.78rem; font-weight: 600; margin-bottom: 20px;
    }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #dc2626;
      animation: blink 1s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .video-card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      max-width: 820px;
      margin: 0 auto 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .video-card img {
      width: 100%;
      border-radius: 10px;
      border: 2px solid #e5e7eb;
    }
    .video-info { font-size: 0.75rem; color: #9ca3af; margin-top: 10px; }

    .back-link {
      display: inline-block;
      margin-top: 4px;
      color: #2563eb;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .back-link:hover { background: #eff6ff; }
  </style>
</head>
<body>

<h1>🎥 Real-Time AI Traffic Detection</h1>
<p class="subtitle">YOLOv8-M · Live Federated Prediction · Signal updated every 3s</p>

<div class="live-badge">
  <span class="live-dot"></span> LIVE
</div>

<div class="video-card">
  <img src="{{ url_for('video_feed') }}" alt="Live Webcam Feed">
  <div class="video-info">Vehicle count and signal time are overlaid directly on the feed</div>
</div>

<a href="/" class="back-link">⬅ Back to Home</a>

</body>
</html>
